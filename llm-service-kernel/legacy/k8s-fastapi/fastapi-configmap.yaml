apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-service-kernel-config
  namespace: llm-service
data:
  APP_HOST: "0.0.0.0"
  APP_PORT: "8080"

  MODEL_BACKEND: "llmd"
  LLMD_BASE_URL: "http://infra-local-inference-gateway-istio.llm-d-local.svc.cluster.local:80"
  LLMD_API_MODE: "completions"
  LLMD_CHAT_PATH: "/v1/chat/completions"
  LLMD_COMPLETIONS_PATH: "/v1/completions"
  MODEL_SERVER_TIMEOUT_S: "300.0"

  SERVED_MODEL_NAME: "qwen2.5-0.5b"
  CACHE_SCOPE: "minikube-dev"

  EXACT_CACHE_ENABLED: "0"
  SEM_CACHE_ENABLED: "0"
  RAG_ENABLED: "0"

  BENCHMARK_SHADOW_MODE: "0"
  RAG_RETRIEVE_EVERY_REQUEST: "0"
  RETURN_DEBUG_BLOCKS: "1"

  AUTH_ENABLED: "0"
  DEV_TENANT_ID: "tenantA"
  TENANT_CLAIM: "tenant_id"

  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"

  TOKENIZER_PATH: ""
  TOKENIZER_LOCAL_ONLY: "1"
