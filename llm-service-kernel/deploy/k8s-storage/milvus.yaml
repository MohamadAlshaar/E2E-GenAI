apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-etcd-pvc
  namespace: llm-service
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-minio-pvc
  namespace: llm-service
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-data-pvc
  namespace: llm-service
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
  namespace: llm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-etcd
  template:
    metadata:
      labels:
        app: milvus-etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.18
          imagePullPolicy: IfNotPresent
          command:
            - etcd
            - -advertise-client-urls=http://milvus-etcd:2379
            - -listen-client-urls
            - http://0.0.0.0:2379
            - --data-dir
            - /etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: periodic
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1h"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
            - name: ETCD_HEARTBEAT_INTERVAL
              value: "500"
            - name: ETCD_ELECTION_TIMEOUT
              value: "5000"
            - name: ETCD_UNSAFE_NO_FSYNC
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
          ports:
            - containerPort: 2379
          volumeMounts:
            - name: etcd-data
              mountPath: /etcd
          readinessProbe:
            tcpSocket:
              port: 2379
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: etcd-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-etcd
  namespace: llm-service
spec:
  selector:
    app: milvus-etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: milvus-user-config
  namespace: llm-service
data:
  user.yaml: |
    etcd:
      requestTimeout: 60000
    common:
      session:
        ttl: 120
        retryTimes: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-minio
  namespace: llm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-minio
  template:
    metadata:
      labels:
        app: milvus-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2023-03-20T20-16-18Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /minio_data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          ports:
            - containerPort: 9000
            - containerPort: 9001
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
          volumeMounts:
            - name: minio-data
              mountPath: /minio_data
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: milvus-minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-minio
  namespace: llm-service
spec:
  selector:
    app: milvus-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: llm-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      initContainers:
        - name: wait-for-etcd
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'until nc -z milvus-etcd 2379; do echo "waiting for etcd"; sleep 2; done']
        - name: clear-stale-sessions
          image: quay.io/coreos/etcd:v3.5.18
          imagePullPolicy: IfNotPresent
          command:
            - etcdctl
            - --endpoints=http://milvus-etcd:2379
            - del
            - --prefix
            - by-dev/meta/session/
          env:
            - name: ETCDCTL_API
              value: "3"
        - name: wait-for-minio
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'until nc -z milvus-minio 9000; do echo "waiting for minio"; sleep 2; done']
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.5.12
          imagePullPolicy: IfNotPresent
          command: ["milvus", "run", "standalone"]
          securityContext:
            seccompProfile:
              type: Unconfined
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"
            limits:
              memory: "10Gi"
          env:
            - name: ETCD_ENDPOINTS
              value: milvus-etcd:2379
            - name: MINIO_ADDRESS
              value: milvus-minio:9000
            - name: MINIO_ACCESS_KEY_ID
              value: minioadmin
            - name: MINIO_SECRET_ACCESS_KEY
              value: minioadmin
          ports:
            - containerPort: 19530
            - containerPort: 9091
          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus
            - name: milvus-rdb-mem
              mountPath: /var/lib/milvus/rdb_data
            - name: milvus-rdb-meta-mem
              mountPath: /var/lib/milvus/rdb_data_meta_kv
            - name: milvus-config
              mountPath: /milvus/configs/user.yaml
              subPath: user.yaml
          startupProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 40
            timeoutSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 30
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5
      volumes:
        - name: milvus-data
          emptyDir: {}
        - name: milvus-rdb-mem
          emptyDir: {}
        - name: milvus-rdb-meta-mem
          emptyDir: {}
        - name: milvus-config
          configMap:
            name: milvus-user-config
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: llm-service
spec:
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: health
      port: 9091
      targetPort: 9091
  type: ClusterIP
