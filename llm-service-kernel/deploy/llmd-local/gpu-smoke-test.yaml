apiVersion: v1
kind: Pod
metadata:
  name: gpu-smoke-test
  namespace: llm-d-local
spec:
  restartPolicy: Never
  containers:
    - name: nvidia-smi
      image: nvidia/cuda:12.8.0-base-ubuntu22.04
      command: ["bash", "-lc", "nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: "1"
