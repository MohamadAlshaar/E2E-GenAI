apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service-kernel
  namespace: llm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-service-kernel
  template:
    metadata:
      labels:
        app: llm-service-kernel
    spec:
      containers:
        - name: llm-service-kernel
          image: llm-service-kernel:fastapi-selfcontained
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: llm-service-kernel-config-fullstack
            - secretRef:
                name: llm-service-kernel-secret
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "6Gi"
          volumeMounts:
            - name: rag-store-tenants
              mountPath: /rag_store_tenants
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 120
            timeoutSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 45
            failureThreshold: 5
      volumes:
        - name: rag-store-tenants
          persistentVolumeClaim:
            claimName: rag-store-tenants-pvc