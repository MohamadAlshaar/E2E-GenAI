apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service-kernel
  namespace: llm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-service-kernel
  template:
    metadata:
      labels:
        app: llm-service-kernel
    spec:
      containers:
        - name: llm-service-kernel
          image: llm-service-kernel:fastapi-patched
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: llm-service-kernel-config-minimal
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10